services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: competitor_prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - competitor_net

  grafana:
    image: grafana/grafana:11.1.4
    container_name: competitor_grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - competitor_net

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: competitor_node_exporter
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks:
      - competitor_net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: competitor_cadvisor
    ports:
      - "${CADVISOR_PORT:-8088}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    privileged: true
    networks:
      - competitor_net

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: competitor_postgres_exporter
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - competitor_net

volumes:
  prometheus_data:
  grafana_data:

networks:
  competitor_net:
    driver: bridge
