services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: competitor_postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - competitor_net

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: airflow_init
    env_file:
      - .env
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      PYTHONPATH: /opt/airflow
      POSTGRES_HOST: postgres
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USER:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD:-admin}
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username "$${_AIRFLOW_WWW_USER_USERNAME}" \
          --password "$${_AIRFLOW_WWW_USER_PASSWORD}" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
    volumes:
      - ./analysis:/opt/airflow/analysis
      - ./llm_processor:/opt/airflow/llm_processor
      - ./scraper:/opt/airflow/scraper
      - ./db:/opt/airflow/db
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - competitor_net

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: airflow_webserver
    env_file:
      - .env
    environment:
      <<: *airflow-env
    command: webserver
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    volumes:
      - ./analysis:/opt/airflow/analysis
      - ./llm_processor:/opt/airflow/llm_processor
      - ./scraper:/opt/airflow/scraper
      - ./db:/opt/airflow/db
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    networks:
      - competitor_net

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: airflow_scheduler
    env_file:
      - .env
    environment:
      <<: *airflow-env
    command: scheduler
    volumes:
      - ./analysis:/opt/airflow/analysis
      - ./llm_processor:/opt/airflow/llm_processor
      - ./scraper:/opt/airflow/scraper
      - ./db:/opt/airflow/db
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    networks:
      - competitor_net

  streamlit:
    build:
      context: .
      dockerfile: docker/streamlit/Dockerfile
    container_name: competitor_dashboard
    env_file:
      - .env
    environment:
      STREAMLIT_SERVER_PORT: ${STREAMLIT_PORT:-8501}
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    volumes:
      - ./dashboard:/app/dashboard
      - ./analysis:/app/analysis
      - ./db:/app/db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - competitor_net

volumes:
  postgres_data:

networks:
  competitor_net:
    driver: bridge
